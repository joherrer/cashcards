services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cashcards_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d cashcards_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    profiles: ["app"]
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/cashcards_db
      DB_USERNAME: dev_user
      DB_PASSWORD: dev_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
