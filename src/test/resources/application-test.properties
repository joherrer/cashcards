# The test profile gets its datasource from a PostgreSQL Testcontainer.

# Use the same Flyway migrations as the application.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Disable Hibernate auto DDL because Flyway owns the schema
spring.jpa.hibernate.ddl-auto=validate

# Initialize test data after Flyway creates the schema.
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
